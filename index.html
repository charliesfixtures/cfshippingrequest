<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CF Shipping Request</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: transparent;
  --row-bg: transparent;
  --row-hover: rgba(0,0,0,0.06);
  --border: rgba(0,0,0,0.12);
  --text: #172b4d;
  --sub: #6b778c;
  --accent: #5b8dee;
  --warn: #e6a817;
  --danger: #e54545;
  --success: #11c987;
  --radius: 8px;
  --input-bg: #f4f5f7;
  --dropdown-bg: #ffffff;
  --check-active: #5b8dee;
  --check-inactive: rgba(0,0,0,0.12);
}

@media (prefers-color-scheme: dark) {
  :root {
    --row-hover: #252839;
    --border: #2d3148;
    --text: #dde1f0;
    --sub: #7880a0;
    --input-bg: #0d0f14;
    --dropdown-bg: #0d0f14;
    --check-active: #5b8dee;
    --check-inactive: #2d3148;
  }
}

html { overflow: hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 0; margin: 0;
  overflow: visible;
  -webkit-font-smoothing: antialiased;
}

/* ── Auth screen ── */
.auth-screen { padding: 16px; background: var(--input-bg); border-radius: var(--radius); margin: 8px; }
.auth-screen p { font-size: 12px; color: var(--sub); line-height: 1.7; margin-bottom: 12px; }
.auth-screen a { color: var(--accent); }
.auth-textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-family: monospace; font-size: 11px; resize: none; height: 60px; margin-bottom: 8px; }
.auth-textarea:focus { outline: none; border-color: var(--accent); }

/* ── Loading / error ── */
.state { padding: 20px 16px; text-align: center; font-size: 12px; color: var(--sub); font-family: monospace; }
.state.error { color: var(--danger); }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RS nudge (no RS filled yet) ── */
.rs-nudge {
  padding: 10px 12px;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--sub);
}
.rs-nudge-icon { font-size: 14px; flex-shrink: 0; }
.rs-nudge-text { line-height: 1.4; }
.rs-nudge-text strong { color: var(--text); font-weight: 600; }

/* ── Header ── */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
}
.hdr-left { display: flex; align-items: center; gap: 8px; }
.hdr-title { font-size: 12px; font-weight: 600; color: var(--sub); letter-spacing: 0.6px; text-transform: uppercase; }
.hdr-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.hdr-status.saved { background: rgba(17,201,135,0.12); color: var(--success); }
.hdr-status.unsaved { background: rgba(230,168,23,0.12); color: var(--warn); }

.btn-sm {
  padding: 4px 10px; border-radius: 5px; font-size: 11px;
  font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--sub);
  transition: all 0.15s;
}
.btn-sm:hover { border-color: var(--sub); color: var(--text); }
.btn-sm.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-sm.primary:hover { opacity: 0.88; }
.btn-sm:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Form sections ── */
.form-wrap { padding: 8px 12px; }

.section-label {
  font-size: 10px; font-weight: 600; color: var(--sub);
  letter-spacing: 0.5px; text-transform: uppercase;
  margin: 10px 0 6px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.section-label:first-child { margin-top: 0; }

/* ── Checkbox rows ── */
.check-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 8px; border-radius: var(--radius);
  cursor: pointer; transition: background 0.15s;
  user-select: none;
}
.check-row:hover { background: var(--row-hover); }
.check-row.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

.check-box {
  width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
  border: 2px solid var(--check-inactive);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; background: transparent;
}
.check-row.active .check-box {
  background: var(--check-active); border-color: var(--check-active);
}
.check-box::after {
  content: '✓'; font-size: 11px; font-weight: 700; color: #fff;
  opacity: 0; transition: opacity 0.15s;
}
.check-row.active .check-box::after { opacity: 1; }

.check-icon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }
.check-label { font-size: 13px; font-weight: 500; color: var(--text); }
.check-sub { font-size: 10px; color: var(--sub); margin-left: auto; white-space: nowrap; }

/* ── Conditional text fields ── */
.conditional-field {
  margin: 0 0 4px 46px;
  overflow: hidden;
  max-height: 0; opacity: 0;
  transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
}
.conditional-field.visible {
  max-height: 80px; opacity: 1; margin: 4px 0 8px 46px;
}

/* ── Text inputs ── */
.form-input {
  width: 100%; padding: 8px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--input-bg);
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px;
  transition: border-color 0.15s;
}
.form-input:focus { outline: none; border-color: var(--accent); }
.form-input::placeholder { color: var(--sub); opacity: 0.6; }
.form-input.error { border-color: var(--danger); }

.form-textarea {
  width: 100%; padding: 8px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--input-bg);
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px;
  resize: vertical; min-height: 48px; max-height: 120px;
  transition: border-color 0.15s;
}
.form-textarea:focus { outline: none; border-color: var(--accent); }
.form-textarea::placeholder { color: var(--sub); opacity: 0.6; }

.field-row { margin-bottom: 8px; }
.field-label {
  font-size: 11px; font-weight: 500; color: var(--sub);
  margin-bottom: 4px; display: flex; align-items: center; gap: 4px;
}

/* ── Validation nudge ── */
.validation-msg {
  font-size: 11px; color: var(--danger); margin: 4px 0 4px 46px;
  display: none;
}
.validation-msg.show { display: block; }

/* ── Footer ── */
.footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px 12px; margin-top: 6px;
  border-top: 1px solid var(--border);
}
.footer-info { font-size: 10px; color: var(--sub); }

/* ── Status message ── */
.status-msg { text-align: center; font-size: 11px; font-family: monospace; padding: 4px 12px 10px; min-height: 20px; color: var(--success); }
.status-msg.error { color: var(--danger); }

/* ── Summary view (post-save compact) ── */
.summary {
  padding: 10px 12px;
}
.summary-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.summary-hdr-left { display: flex; align-items: center; gap: 8px; }
.summary-hdr-left .hdr-title { font-size: 12px; font-weight: 600; color: var(--sub); letter-spacing: 0.6px; text-transform: uppercase; }
.summary-hdr-left .hdr-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; background: rgba(17,201,135,0.12); color: var(--success); }

.summary-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 6px;
}
.summary-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 5px;
  font-size: 11px; font-weight: 500;
  background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border);
}
.summary-tag .tag-icon { font-size: 12px; }
.summary-tag.default {
  border-style: dashed; opacity: 0.7;
}

.summary-detail {
  font-size: 11px; color: var(--sub); line-height: 1.5;
  margin-bottom: 4px; padding-left: 2px;
}
.summary-detail strong { color: var(--text); font-weight: 500; }
</style>
</head>
<body>

<div id="app"><div class="state"><div class="spinner"></div>Loading...</div></div>

<script>
// ════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════
const CFG = {
  API_KEY: '53abc1f4686798eadbeb8f91ea79c9bb',
  STORAGE_KEY: 'shippingRequest',
  // RS field ID looked up dynamically per-board (see findRSFieldId)
  // Production: 699deaf8ae2995aa04f30441 | Test: 69a61fe3c1ae84f3a1d62bf8
};

// ════════════════════════════════════════════════════════
// v0.5 — Delivery instruction definitions
// Section 1: Handling (Drop-Off opt-in, White Glove = default assumed)
// Section 2: Scheduling (First/Last Stop, mutually exclusive, optional)
// Section 3: Memos (Delivery + Pick-Up, independent, text required when checked)
// ════════════════════════════════════════════════════════
const FLAGS = [
  { id: 'dropOff',      icon: '📦', label: 'Drop-Off',       tag: 'Drop',     group: null,        sub: 'Leave at door/dock',          section: 'handling' },
  { id: 'firstStop',    icon: '🥇', label: 'First Stop',     tag: '1st',      group: 'stopOrder', sub: 'Scheduling preference',       section: 'scheduling' },
  { id: 'lastStop',     icon: '🏁', label: 'Last Stop',      tag: 'Last',     group: 'stopOrder', sub: 'Scheduling preference',       section: 'scheduling' },
  { id: 'deliveryMemo', icon: '📋', label: 'Delivery Memo',  tag: 'Delivery', group: null,        sub: 'Partial or specific delivery', section: 'memos', hasTextField: true, textPlaceholder: 'Describe items being delivered (e.g., deliver only items 1, 3 — fridge and ice maker)', textRequired: true },
  { id: 'pickUpMemo',   icon: '♻️', label: 'Pick-Up Memo',   tag: 'Pick-up',  group: null,        sub: 'Items returning on truck',     section: 'memos', hasTextField: true, textPlaceholder: 'Describe items being picked up (e.g., old 6-burner range for replacement)', textRequired: true },
];

// ════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════
let t = null;
let token = null;
let hasRS = false;       // RS custom field filled?
let viewMode = 'form';   // 'form' | 'summary'
let formData = {
  dropOff: false,
  firstStop: false,
  lastStop: false,
  deliveryMemo: false,
  deliveryMemoDetail: '',
  pickUpMemo: false,
  pickUpMemoDetail: '',
  specialRequest: '',
  customerName: '',
  customerPhone: '',
  savedAt: null,
};

// ════════════════════════════════════════════════════════
// Trello API (same pattern as Attendance)
// ════════════════════════════════════════════════════════
async function api(path, method = 'GET', body = null) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `https://api.trello.com/1${path}${sep}key=${CFG.API_KEY}&token=${token}`;
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(`Trello ${res.status}: ${await res.text()}`);
  return res.json();
}

// ════════════════════════════════════════════════════════
// Find RS custom field ID dynamically (board-agnostic)
// ════════════════════════════════════════════════════════
let cachedRSFieldId = null;

async function findRSFieldId() {
  if (cachedRSFieldId) return cachedRSFieldId;
  try {
    const board = await t.board('id');
    const fields = await api(`/boards/${board.id}/customFields`);
    const rsField = fields.find(f => f.name === 'RS');
    if (rsField) cachedRSFieldId = rsField.id;
    return cachedRSFieldId;
  } catch (e) {
    console.warn('Could not look up RS field definition:', e);
    return null;
  }
}

// ════════════════════════════════════════════════════════
// Check RS custom field (dynamic ID lookup)
// ════════════════════════════════════════════════════════
async function checkRS() {
  try {
    const rsFieldId = await findRSFieldId();
    if (!rsFieldId) {
      console.warn('RS field not found on board — showing form (graceful fail)');
      return true;
    }

    const card = await t.card('customFieldItems');
    const cfItems = card.customFieldItems || [];
    const rsField = cfItems.find(cf => cf.idCustomField === rsFieldId);
    return !!(rsField && rsField.value && (rsField.value.text || rsField.value.date || rsField.value.number));
  } catch (e) {
    console.warn('Could not check RS field:', e);
    return true;
  }
}

// ════════════════════════════════════════════════════════
// Check RS via REST API (bypasses SDK cache, used by poller)
// ════════════════════════════════════════════════════════
let cachedCardId = null;
let rsPolling = false; // overlap guard

async function checkRS_REST() {
  if (rsPolling) return hasRS; // skip if previous call still in-flight
  rsPolling = true;
  try {
    const rsFieldId = await findRSFieldId();
    if (!rsFieldId) return true; // graceful fail

    if (!cachedCardId) {
      const card = await t.card('id');
      cachedCardId = card.id;
    }

    const cfItems = await api(`/cards/${cachedCardId}/customFieldItems`);
    const rsField = cfItems.find(cf => cf.idCustomField === rsFieldId);
    // Handle all cases: item missing, value null, value empty object, value.text empty string
    if (!rsField || !rsField.value) return false;
    const v = rsField.value;
    return !!(v.text || v.date || v.number);
  } catch (e) {
    console.warn('REST RS check failed:', e.message);
    return hasRS; // keep current state on error
  } finally {
    rsPolling = false;
  }
}

// ════════════════════════════════════════════════════════
// Mutual exclusivity enforcement
// ════════════════════════════════════════════════════════
function enforceExclusivity(flagId) {
  const flag = FLAGS.find(f => f.id === flagId);
  if (!flag || !flag.group) return;

  if (formData[flagId]) {
    FLAGS.forEach(f => {
      if (f.group === flag.group && f.id !== flagId) {
        formData[f.id] = false;
      }
    });
  }
}

// ════════════════════════════════════════════════════════
// Toggle checkbox
// ════════════════════════════════════════════════════════
function toggleCheck(flagId) {
  formData[flagId] = !formData[flagId];
  enforceExclusivity(flagId);
  // Clear validation message on toggle
  const valMsg = document.getElementById(`val-${flagId}`);
  if (valMsg) valMsg.classList.remove('show');
  render();
}

// ════════════════════════════════════════════════════════
// Read form state from DOM (Attendance lesson: DOM = truth)
// ════════════════════════════════════════════════════════
function readFormFromDOM() {
  const data = {
    dropOff: false,
    firstStop: false, lastStop: false,
    deliveryMemo: false, deliveryMemoDetail: '',
    pickUpMemo: false, pickUpMemoDetail: '',
    specialRequest: '', customerName: '', customerPhone: '',
  };

  FLAGS.forEach(f => {
    const row = document.getElementById(`check-${f.id}`);
    if (row) data[f.id] = row.classList.contains('active');
  });

  const delDetail = document.getElementById('deliveryMemoDetail');
  if (delDetail) data.deliveryMemoDetail = delDetail.value.trim();

  const puDetail = document.getElementById('pickUpMemoDetail');
  if (puDetail) data.pickUpMemoDetail = puDetail.value.trim();

  const special = document.getElementById('specialRequest');
  if (special) data.specialRequest = special.value.trim();

  const cname = document.getElementById('customerName');
  if (cname) data.customerName = cname.value.trim();

  const phone = document.getElementById('customerPhone');
  if (phone) data.customerPhone = phone.value.trim();

  return data;
}

// ════════════════════════════════════════════════════════
// Validate — memo text required when checkbox ticked
// ════════════════════════════════════════════════════════
function validateForm(data) {
  const errors = [];

  FLAGS.forEach(f => {
    if (f.textRequired && data[f.id] && !data[f.id + 'Detail']) {
      errors.push(f.id);
    }
  });

  return errors;
}

// ════════════════════════════════════════════════════════
// Save to Trello (t.set = pluginData, readable by CF Dispatch)
// ════════════════════════════════════════════════════════
async function saveForm() {
  const btn = document.getElementById('saveBtn');

  try {
    const data = readFormFromDOM();

    // Validate memo fields
    const errors = validateForm(data);
    if (errors.length > 0) {
      // Show validation messages + highlight fields
      errors.forEach(flagId => {
        const valMsg = document.getElementById(`val-${flagId}`);
        if (valMsg) valMsg.classList.add('show');
        const input = document.getElementById(flagId + 'Detail');
        if (input) input.classList.add('error');
      });
      // Resize iframe to fit validation messages
      if (t) requestAnimationFrame(() => t.sizeTo('#app').catch(() => {}));
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

    data.savedAt = new Date().toISOString();

    await t.set('card', 'shared', CFG.STORAGE_KEY, data);
    Object.assign(formData, data);

    // Switch to summary view after successful save
    viewMode = 'summary';
    render();

  } catch (e) {
    console.error('Save error:', e);
    if (btn) { btn.textContent = '✗ Error'; btn.disabled = false; }
    const msg = document.getElementById('statusMsg');
    if (msg) { msg.textContent = e.message; msg.className = 'status-msg error'; }
  }
}

// ════════════════════════════════════════════════════════
// Clear form
// ════════════════════════════════════════════════════════
async function clearForm() {
  formData = {
    dropOff: false,
    firstStop: false, lastStop: false,
    deliveryMemo: false, deliveryMemoDetail: '',
    pickUpMemo: false, pickUpMemoDetail: '',
    specialRequest: '', customerName: '', customerPhone: '',
    savedAt: null,
  };
  await t.set('card', 'shared', CFG.STORAGE_KEY, formData);
  viewMode = 'form';
  render();
}

// ════════════════════════════════════════════════════════
// Switch to edit mode from summary
// ════════════════════════════════════════════════════════
function editForm() {
  viewMode = 'form';
  render();
}

// ════════════════════════════════════════════════════════
// Render — RS nudge (no RS)
// ════════════════════════════════════════════════════════
function renderNudge() {
  document.getElementById('app').innerHTML = `
    <div class="rs-nudge">
      <span class="rs-nudge-icon">📋</span>
      <span class="rs-nudge-text">Fill the <strong>RS</strong> field above to enable shipping instructions</span>
    </div>`;
  if (t) requestAnimationFrame(() => t.sizeTo('#app').catch(() => {}));
}

// ════════════════════════════════════════════════════════
// Render — Summary view (post-save compact)
// ════════════════════════════════════════════════════════
function renderSummary() {
  const savedLabel = formData.savedAt
    ? new Date(formData.savedAt).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })
    : '';

  // Build active flag tags
  const tags = [];

  // Handling: show Drop-Off if checked, otherwise show White Glove (assumed default) as dashed/muted
  if (formData.dropOff) {
    tags.push(`<span class="summary-tag"><span class="tag-icon">📦</span>Drop-Off</span>`);
  } else {
    tags.push(`<span class="summary-tag default"><span class="tag-icon">🧤</span>White Glove</span>`);
  }

  // Scheduling
  if (formData.firstStop) tags.push(`<span class="summary-tag"><span class="tag-icon">🥇</span>1st Stop</span>`);
  if (formData.lastStop)  tags.push(`<span class="summary-tag"><span class="tag-icon">🏁</span>Last Stop</span>`);

  // Memos
  if (formData.deliveryMemo) tags.push(`<span class="summary-tag"><span class="tag-icon">📋</span>Delivery</span>`);
  if (formData.pickUpMemo)   tags.push(`<span class="summary-tag"><span class="tag-icon">♻️</span>Pick-up</span>`);

  const activeTags = tags.join('');

  // Build text details
  const details = [];
  if (formData.deliveryMemo && formData.deliveryMemoDetail) {
    details.push(`<div class="summary-detail">📋 <strong>Delivery:</strong> ${escHtml(formData.deliveryMemoDetail)}</div>`);
  }
  if (formData.pickUpMemo && formData.pickUpMemoDetail) {
    details.push(`<div class="summary-detail">♻️ <strong>Pick-up:</strong> ${escHtml(formData.pickUpMemoDetail)}</div>`);
  }
  if (formData.customerName) {
    details.push(`<div class="summary-detail">👤 <strong>Contact:</strong> ${escHtml(formData.customerName)}</div>`);
  }
  if (formData.customerPhone) {
    details.push(`<div class="summary-detail">📞 <strong>Phone:</strong> ${escHtml(formData.customerPhone)}</div>`);
  }
  if (formData.specialRequest) {
    details.push(`<div class="summary-detail">📝 <strong>Note:</strong> ${escHtml(formData.specialRequest)}</div>`);
  }

  document.getElementById('app').innerHTML = `
    <div class="summary">
      <div class="summary-hdr">
        <div class="summary-hdr-left">
          <span class="hdr-title">Shipping Request</span>
          <span class="hdr-status saved">✓ ${savedLabel}</span>
        </div>
        <div>
          <button class="btn-sm" onclick="editForm()">✎ Edit</button>
        </div>
      </div>
      <div class="summary-tags">${activeTags}</div>
      ${details.length > 0 ? details.join('') : ''}
    </div>`;

  if (t) requestAnimationFrame(() => t.sizeTo('#app').catch(() => {}));
}

// ════════════════════════════════════════════════════════
// Render — Full form (editing mode)
// ════════════════════════════════════════════════════════
function renderForm() {
  const hasSaved = !!formData.savedAt;
  const savedLabel = hasSaved
    ? new Date(formData.savedAt).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })
    : null;

  // Build checkbox rows grouped by section
  function buildCheckRow(f) {
    const isActive = formData[f.id];
    const isDisabled = !isActive && f.group && FLAGS.some(other =>
      other.group === f.group && other.id !== f.id && formData[other.id]
    );

    const conditionalField = f.hasTextField ? `
      <div class="conditional-field ${isActive ? 'visible' : ''}" id="cond-${f.id}">
        <input class="form-input" type="text" id="${f.id}Detail"
          placeholder="${escAttr(f.textPlaceholder || '')}"
          value="${escAttr(formData[f.id + 'Detail'] || '')}"
          oninput="this.classList.remove('error'); var v=document.getElementById('val-${f.id}'); if(v) v.classList.remove('show');"
        />
      </div>
      ${f.textRequired ? `<div class="validation-msg" id="val-${f.id}">⚠ Please describe — this helps the manager plan the route</div>` : ''}` : '';

    return `
      <div class="check-row ${isActive ? 'active' : ''} ${isDisabled ? 'disabled' : ''}"
           id="check-${f.id}"
           onclick="${isDisabled ? '' : `toggleCheck('${f.id}')`}">
        <div class="check-box"></div>
        <span class="check-icon">${f.icon}</span>
        <span class="check-label">${f.label}</span>
        <span class="check-sub">${f.sub}</span>
      </div>
      ${conditionalField}`;
  }

  const handlingFlags = FLAGS.filter(f => f.section === 'handling').map(buildCheckRow).join('');
  const schedulingFlags = FLAGS.filter(f => f.section === 'scheduling').map(buildCheckRow).join('');
  const memoFlags = FLAGS.filter(f => f.section === 'memos').map(buildCheckRow).join('');

  // White Glove assumed note
  const wgNote = !formData.dropOff
    ? `<div style="font-size:10px;color:var(--sub);padding:2px 8px 4px 46px;font-style:italic">🧤 White Glove assumed if unchecked</div>`
    : '';

  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <div class="hdr-left">
        <span class="hdr-title">Shipping Request</span>
        ${hasSaved ? `<span class="hdr-status saved">✓ Saved ${savedLabel}</span>` : ''}
      </div>
      <div class="hdr-right">
        ${hasSaved ? `<button class="btn-sm" onclick="clearForm()">Clear</button>` : ''}
        <button class="btn-sm primary" onclick="saveForm()" id="saveBtn">Save</button>
      </div>
    </div>

    <div class="form-wrap">
      <div class="section-label">Handling</div>
      ${handlingFlags}
      ${wgNote}

      <div class="section-label">Scheduling Preference</div>
      ${schedulingFlags}

      <div class="section-label">Memos</div>
      ${memoFlags}

      <div class="section-label" style="margin-top:14px">Contact</div>
      <div class="field-row">
        <div class="field-label">👤 Contact Name</div>
        <input class="form-input" type="text" id="customerName"
          placeholder="e.g., Craig Hopson"
          value="${escAttr(formData.customerName || '')}"
        />
      </div>
      <div class="field-row">
        <div class="field-label">📞 Customer Phone</div>
        <input class="form-input" type="tel" id="customerPhone"
          placeholder="e.g., 323-555-1234"
          value="${escAttr(formData.customerPhone || '')}"
        />
      </div>

      <div class="section-label" style="margin-top:14px">Special Instructions</div>
      <div class="field-row">
        <textarea class="form-textarea" id="specialRequest"
          placeholder="Access instructions, time constraints, on-site service tasks, etc."
        >${escHtml(formData.specialRequest || '')}</textarea>
      </div>
    </div>

    <div class="footer">
      <span class="footer-info">Data saved to this card · visible in CF Dispatch</span>
    </div>
    <div class="status-msg" id="statusMsg"></div>`;

  if (t) requestAnimationFrame(() => t.sizeTo('#app').catch(() => {}));
}

// ════════════════════════════════════════════════════════
// Render router
// ════════════════════════════════════════════════════════
function render() {
  if (!hasRS) { renderNudge(); return; }
  if (viewMode === 'summary' && formData.savedAt) { renderSummary(); return; }
  renderForm();
}

// ════════════════════════════════════════════════════════
// HTML escape helpers
// ════════════════════════════════════════════════════════
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escAttr(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════════════════════════════════
// v0.4 backward compatibility — migrate old pluginData
// ════════════════════════════════════════════════════════
function migrateV04Data(saved) {
  // v0.4 had: whiteGlove (bool), equipRemoval (bool), equipRemovalDetail (string)
  // v0.5:     dropOff (bool),    pickUpMemo (bool),   pickUpMemoDetail (string)
  //
  // Migration logic:
  // - whiteGlove:true in v0.4 → dropOff:false in v0.5 (White Glove is now the default)
  // - dropOff:true stays dropOff:true
  // - equipRemoval → pickUpMemo, equipRemovalDetail → pickUpMemoDetail
  // - New fields (deliveryMemo, deliveryMemoDetail) default to false/''

  if ('equipRemoval' in saved) {
    saved.pickUpMemo = saved.equipRemoval;
    saved.pickUpMemoDetail = saved.equipRemovalDetail || '';
    delete saved.equipRemoval;
    delete saved.equipRemovalDetail;
  }

  // whiteGlove no longer stored — drop it
  if ('whiteGlove' in saved) {
    // If whiteGlove was true and dropOff was false, that's now the default (no action)
    // If whiteGlove was false and dropOff was true, dropOff stays true
    delete saved.whiteGlove;
  }

  // Ensure new fields exist
  if (!('deliveryMemo' in saved)) saved.deliveryMemo = false;
  if (!('deliveryMemoDetail' in saved)) saved.deliveryMemoDetail = '';
  if (!('pickUpMemo' in saved)) saved.pickUpMemo = false;
  if (!('pickUpMemoDetail' in saved)) saved.pickUpMemoDetail = '';
  if (!('customerName' in saved)) saved.customerName = '';

  return saved;
}

// ════════════════════════════════════════════════════════
// Auth screen
// ════════════════════════════════════════════════════════
function showAuth() {
  document.getElementById('app').innerHTML = `
    <div class="auth-screen">
      <p><strong>One-time setup</strong> — get your Trello token:</p>
      <p>
        <a href="https://trello.com/1/authorize?expiration=never&scope=read,write&response_type=token&key=${CFG.API_KEY}&name=CF+Shipping+Request" target="_blank">
          → Open Trello Authorization Page
        </a><br/>
        Click <strong>Allow</strong>, then copy and paste the token below:
      </p>
      <textarea class="auth-textarea" id="tokenInput" placeholder="Paste token here (starts with ATTA...)"></textarea>
      <button class="btn-sm primary" style="width:100%;padding:8px" onclick="saveToken()">Save Token</button>
      <div id="authMsg" style="font-size:11px;color:var(--danger);margin-top:6px;min-height:14px;font-family:monospace"></div>
    </div>`;
  if (t) t.sizeTo('#app').catch(() => {});
}

async function saveToken() {
  const val = document.getElementById('tokenInput')?.value.trim();
  const msg = document.getElementById('authMsg');
  if (!val) { if (msg) msg.textContent = 'Paste your token first.'; return; }
  if (val.length < 40) { if (msg) msg.textContent = 'Token too short — copy the whole thing.'; return; }
  try {
    await t.set('member', 'private', 'token', val);
    token = val;
    await boot();
  } catch (e) {
    if (msg) msg.textContent = 'Error: ' + e.message;
  }
}

// ════════════════════════════════════════════════════════
// UI state helper
// ════════════════════════════════════════════════════════
function setState(type, msg) {
  document.getElementById('app').innerHTML = type === 'loading'
    ? `<div class="state"><div class="spinner"></div>${msg}</div>`
    : `<div class="state error">⚠️ ${msg}<br/><br/><button class="btn-sm" onclick="boot()">↺ Retry</button></div>`;
  if (t) t.sizeTo('#app').catch(() => {});
}

// ════════════════════════════════════════════════════════
// Boot
// ════════════════════════════════════════════════════════
async function boot() {
  setState('loading', 'Initializing...');
  try {
    if (!t) {
      t = window.TrelloPowerUp.iframe({
        appKey: CFG.API_KEY,
        appName: 'CF Shipping Request',
      });
    }

    token = await t.get('member', 'private', 'token');
    if (!token) { showAuth(); return; }

    // Check RS custom field — gate the form
    hasRS = await checkRS();

    // Load saved data regardless (for summary view on reopen)
    const saved = await t.get('card', 'shared', CFG.STORAGE_KEY);
    if (saved) {
      // Migrate v0.4 data if needed
      const migrated = migrateV04Data(saved);
      Object.assign(formData, migrated);
    }

    // If data was previously saved, show summary view on reopen
    if (formData.savedAt) {
      viewMode = 'summary';
    } else {
      viewMode = 'form';
    }

    render();

    // Poll for RS changes via REST API (SDK cache doesn't update on field edits)
    // Check every 5s. Overlap guard prevents stacking. findRSFieldId + cardId cached.
    if (window._rsPoller) clearInterval(window._rsPoller);
    window._rsPoller = setInterval(async () => {
      try {
        const wasRS = hasRS;
        hasRS = await checkRS_REST();
        if (hasRS !== wasRS) {
          console.log('RS changed:', wasRS, '→', hasRS);
          render();
        }
      } catch (e) { console.warn('RS poller error:', e.message); }
    }, 5000);

  } catch (e) {
    console.error('Boot error:', e);
    if (!token) { showAuth(); return; }
    setState('error', e.message);
  }
}

boot();
</script>
